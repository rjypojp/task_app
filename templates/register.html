<!DOCTYPE html>
<html>
<head>
    <title>ユーザー登録</title>
</head>
<body>

<h1>ユーザー登録</h1>

<form method="POST">

    <label>ユーザー名</label>
    <input type="text" name="username" required>
    <br><br>

    <label>パスワード</label>
    <input type="password" name="password" required>
    <br><br>

    <button type="submit">登録</button>

</form>
<p>
    すでにアカウントをお持ちの方は
    <a href="/login">ログインはこちら</a>
</p>
</body>    
</html>
